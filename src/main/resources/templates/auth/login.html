<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Login')}"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<main>
    <div class="form-container">
        <h1>Welcome Back</h1>
        <div class="alert alert-error" th:if="${invalidCredentials}">
            Invalid username or password. Please try again.
        </div>
        <form th:action="@{/auth/login}" th:object="${loginData}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" placeholder="Enter username"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Enter password"/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
        </form>
        <p style="text-align:center; margin-top:1.2rem; color:#8B7B6B; font-size:0.9rem;">
            Don't have an account? <a th:href="@{/auth/register}" style="color:#C9967A;">Register here</a>
        </p>
    </div>
</main>
<th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
