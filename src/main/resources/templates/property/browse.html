<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Browse Properties')}"/>
</head>
<body>

<th:block th:replace="~{fragments/layout :: navbar}"/>

<main>
    <div style="max-width:1200px; margin:0 auto; padding:2rem;">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <h1 style="font-size:2rem; color:#1a73e8;">Available Properties</h1>
            <a th:if="${session.userId != null}" th:href="@{/properties/add}" class="btn btn-primary">
                + List Your Property
            </a>
        </div>

        <!-- No properties message -->
        <div th:if="${#lists.isEmpty(properties)}" style="text-align:center; padding:4rem; color:#888;">
            <p style="font-size:1.2rem;">No properties available at the moment.</p>
            <a th:href="@{/}" class="btn btn-outline" style="margin-top:1rem;">Back to Home</a>
        </div>

        <!-- Properties grid -->
        <div class="properties-grid" th:unless="${#lists.isEmpty(properties)}">
            <div class="property-card" th:each="property : ${properties}">
                <div class="property-card-image">
                    <img th:if="${property.imageUrl != null and !property.imageUrl.isEmpty()}"
                         th:src="${property.imageUrl}"
                         th:alt="${property.rating}"
                         style="width:100%; height:180px; object-fit:cover;"/>
                    <span th:unless="${property.imageUrl != null and !property.imageUrl.isEmpty()}">🏠</span>
                </div>
                <div class="property-card-body">
                    <span th:text="${property.type}" style="font-size:0.75rem; background:#e3eefe; color:#1a73e8; padding:2px 8px; border-radius:20px;"></span>
                    <h3 th:text="${property.rating}" style="margin-top:0.5rem;"></h3>
                    <p class="location">📍 <span th:text="${property.location}"></span></p>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem;">
                        <span class="price">$<span th:text="${property.pricePerNight}"></span> <small style="font-weight:400; color:#888;">/night</small></span>
                    </div>
                    <div style="display:flex; gap:1rem; margin-top:0.8rem; font-size:0.85rem; color:#666;">
                        <span>🛏 <span th:text="${property.bedrooms}"></span> Bed</span>
                        <span>🚿 <span th:text="${property.bathrooms}"></span> Bath</span>
                        <span>👥 <span th:text="${property.maxGuests}"></span> Guests</span>
                    </div>
                    <a th:href="@{/properties/{id}(id=${property.id})}" class="btn btn-primary" style="width:100%; margin-top:1rem; text-align:center;">View Details</a>
                </div>
            </div>
        </div>

    </div>
</main>

<th:block th:replace="~{fragments/layout :: footer}"/>

</body>
</html>
