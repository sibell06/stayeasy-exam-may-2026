<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Host Dashboard')}"/>
</head>
<body>

<th:block th:replace="~{fragments/layout :: navbar}"/>

<main style="max-width:900px; margin:2rem auto; padding:0 1.5rem;">

    <h1 style="font-family:'Cormorant Garamond',serif; font-size:2.4rem; font-weight:400; color:#3D3530; margin-bottom:1.5rem;">Host Dashboard</h1>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(reservations)}"
         style="text-align:center; padding:4rem; background:#FDFAF6; border-radius:20px; border:1px solid rgba(201,150,122,0.15);">
        <p style="font-size:1rem; color:#BFB0A3;">No reservations for your properties yet.</p>
        <a th:href="@{/properties/add}" class="btn btn-primary" style="margin-top:1rem;">List a Property</a>
    </div>

    <!-- Reservations list -->
    <div th:unless="${#lists.isEmpty(reservations)}"
         style="display:flex; flex-direction:column; gap:1rem;">

        <div th:each="reservation : ${reservations}"
             style="background:#FDFAF6; border-radius:16px; padding:1.5rem;
                    border:1px solid rgba(201,150,122,0.15);
                    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">

            <div>
                <h3 style="font-family:'Cormorant Garamond',serif; font-weight:400; font-size:1.3rem; color:#3D3530; margin-bottom:0.3rem;"
                    th:text="${reservation.property.title}"></h3>
                <p style="color:#BFB0A3; font-size:0.87rem;" th:text="${reservation.property.location}"></p>
                <p style="margin-top:0.5rem; font-size:0.88rem; color:#8B7B6B;">
                    Renter: <strong th:text="${reservation.renter.username}"></strong>
                </p>
                <p style="font-size:0.88rem; color:#8B7B6B; margin-top:0.3rem;">
                    <span th:text="${reservation.checkIn}"></span>
                    — <span th:text="${reservation.checkOut}"></span>
                    &nbsp;·&nbsp; <span th:text="${reservation.guests}"></span> guests
                </p>
                <p style="margin-top:0.4rem; font-size:0.92rem; color:#3D3530;">
                    Total: <strong>$<span th:text="${reservation.totalPrice}"></span></strong>
                </p>
            </div>

            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem;">

                <span th:text="${reservation.status}"
                      th:classappend="${reservation.status.name() == 'PENDING'} ? 'badge-pending'
                                    : (${reservation.status.name() == 'APPROVED'} ? 'badge-approved'
                                    : (${reservation.status.name() == 'REJECTED'} ? 'badge-rejected'
                                    : 'badge-cancelled'))"
                      style="padding:4px 14px; border-radius:50px; font-size:0.75rem; font-weight:500; letter-spacing:0.06em; text-transform:uppercase;">
                </span>

                <div th:if="${reservation.status.name() == 'PENDING'}"
                     style="display:flex; gap:0.5rem;">
                    <form th:action="@{/reservations/{id}/approve(id=${reservation.id})}" method="post">
                        <button type="submit" class="btn btn-primary"
                                style="font-size:0.8rem; padding:0.4rem 1rem;">
                            Approve
                        </button>
                    </form>
                    <form th:action="@{/reservations/{id}/reject(id=${reservation.id})}" method="post">
                        <button type="submit" class="btn btn-danger"
                                style="font-size:0.8rem; padding:0.4rem 1rem;">
                            Reject
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

</main>

<th:block th:replace="~{fragments/layout :: footer}"/>

</body>
</html>
